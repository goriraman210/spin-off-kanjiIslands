
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>spin-off（スピンオフ）漢字 Typing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon (8).ico" sizes="any">
<style>
    body{
    margin:0;
    background:#000;
    overflow:hidden;

    font-family:"Yomogi", cursive;
}


/* タイトル画面 */

#title-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:#000;
    color:#fff;

    font-family:"Yomogi", cursive;

    opacity:0;
    transition:opacity 0.8s ease;

}


#title-screen.show{
    opacity:1;
}


#title-screen.hide{
    opacity:0;
}



#title-screen h1{

    margin:0;

    font-size:64px;

    line-height:1.3;

}



.gradient-text{

    background:linear-gradient(to bottom,#FFD700,#00C853);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    background-clip:text;

    color:transparent;

    font-size:52px;

}



/* 会社名画面 */

#company-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:#000;

    font-family:"Yomogi", cursive;

    opacity:0;

    transition:opacity .8s ease;

}



#company-screen.show{

    opacity:1;

}



#company-screen.hide{

    opacity:0;

}



.company{

    color:#fff;

    font-size:56px;

    margin-bottom:50px;

}



.member-grid{

    display:grid;

    grid-template-columns:auto auto;

    gap:20px 120px;

    justify-content:center;

}



.member{

    font-size:40px;


    background:linear-gradient(to bottom,#ffffff,#66ccff);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    background-clip:text;

    color:transparent;

}
/* OP省略 */

#skip-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;
    color:#fff;

    font-family:"Yomogi", cursive;

    opacity:0;
    transition:opacity .8s ease;

}

#skip-screen.show{
    opacity:1;
}

#skip-screen.hide{
    opacity:0;
}

#skip-screen h1{
    font-size:60px;
}
/* スタート画面 */

#start-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;

    opacity:0;

    transition:opacity .8s ease;

}

#start-screen.show{

    opacity:1;

}

#start-btn{

    width:320px;
    height:90px;

    border:none;
    border-radius:18px;

    background:#666;

    color:#fff;

    font-size:40px;

    font-family:"Yomogi", cursive;

    cursor:pointer;

    transition:all .25s ease;

}

#start-btn:hover{

    background:#888;

    transform:scale(1.05);

}
/* 名前入力画面 */
#name-panel{

    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100vh;

    display: none;

    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,.6);

}

#name-panel.show{

    display: flex;

}

#name-panel .panel{

    width: 500px;
    padding: 35px;

    background: #6f6f6f;

    border-radius: 25px;

    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 25px;

    box-shadow: 0 10px 30px rgba(0,0,0,.5);

}
/* タイトル */
#name-panel h2{
    margin: 0;
    color: white;
    font-size: 38px;
    font-weight: bold;
}

/* 入力欄 */
#player-name{
    width: 90%;
    height: 65px;
    border: none;
    border-radius: 15px;
    background: white;
    font-size: 28px;
    text-align: center;
    outline: none;

    font-family: "Yomogi", cursive;
}

/* 決定ボタン */
#name-ok-btn{
    width: 90%;
    height: 70px;
    border: none;
    border-radius: 15px;
    background: #59d8ff;
    color: white;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;

    font-family: "Yomogi", cursive;
}

#name-ok-btn:hover{
    background: #38cbff;
    transform: scale(1.03);
}

#name-ok-btn:active{
    transform: scale(0.98);
}
/* 性別パネル */

#gender-panel{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:none;

    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.6);

    font-family:"Yomogi", cursive;

}

#gender-panel.show{

    display:flex;

}

#gender-panel .panel{

    width:500px;

    padding:35px;

    background:#6f6f6f;

    border-radius:25px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:30px;

}

#gender-panel h2{

    margin:0;

    color:white;

    font-size:40px;

}

.gender-area{

    width:100%;

    display:flex;

    justify-content:space-around;

}

.gender-box{

    display:flex;

    flex-direction:column;

    align-items:center;

    cursor:pointer;

}

.gender-icon{

    width:90px;
    height:90px;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:48px;

    color:white;

}

#male-box .gender-icon{

    background:#4fc3ff;

}

#female-box .gender-icon{

    background:#ff6bb5;

}

.gender-arrow{

    margin-top:15px;

    font-size:42px;

    color:white;

    height:42px;

}

.gender-arrow.show{

    visibility:visible;

}

#gender-ok-btn{

    width:90%;
    height:70px;

    border:none;

    border-radius:15px;

    background:#59d8ff;

    color:white;

    font-size:30px;

    font-family:"Yomogi", cursive;

    cursor:pointer;

}
/* プレイヤー生成画面 */

#create-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:none;

    justify-content:center;
    align-items:center;

    flex-direction:column;

    background:#000;

}

#create-screen.show{

    display:flex;

}

#gear{

    font-size:80px;

    margin-bottom:180px;

}

#player-ball{

    width:80px;
    height:80px;

    border-radius:50%;

    margin-top:-30px;

    background:#4fc3ff;

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}
</style>
</head>


<body>
    

    <!-- タイトル画面 -->
    <div id="title-screen">

        <h1>
            漢字 Typing<br>

            <span class="gradient-text">
                spin-off スピンオフ
            </span>

        </h1>

    </div>



    <!-- 会社名画面 -->
    <div id="company-screen">

        <div>

            <div class="company">
                会社:(秘密厳守のため名前は出しません)
            </div>

            <div class="member-grid">

                <div class="member">©月満社</div>
                <div class="member">Sさん</div>

                <div class="member">©The Original 0</div>
                <div class="member">Goriraさん</div>

                <div class="member">©The Original 0</div>
                <div class="member">Dさん</div>

            </div>

        </div>

    </div>



    <!-- OP省略 -->
    <div id="skip-screen">

        <h1>OPムービー省略</h1>

    </div>



    <!-- スタート画面 -->
    <div id="start-screen">

        <button id="start-btn">
            START
        </button>

    </div>



    <!-- 名前入力画面 -->
<div id="name-panel">

    <div class="panel">

        <h2>名前を入力してくれ！</h2>

        <input
            type="text"
            id="player-name"
            placeholder="ここに名前を入力"
            maxlength="12"
        >

        <button id="name-ok-btn">
            決定
        </button>

    </div>

</div>
<!-- 性別選択画面 -->
<div id="gender-panel">

    <div class="panel">

        <h2>男 or 女？</h2>

        <div class="gender-area">

<div class="gender-box" id="male-box">

    <div class="gender-icon">
        <img src="otoko.png" alt="" style="width: 76px; height: 76px;">
    </div>

    <div class="gender-arrow" id="male-arrow"></div>

</div>

            <div class="gender-box" id="female-box">

    <div class="gender-icon">
        <img src="onnna.png" alt="" style="width: 76px; height: 76px;">
    </div>

    <div class="gender-arrow" id="female-arrow"></div>

</div>

        </div>

        <button id="gender-ok-btn">
            決定
        </button>

    </div>

</div>
<!-- プレイヤー生成画面 -->
<div id="create-screen">

    <div id="gear">⚙️</div>

    <div id="player-ball"></div>

</div>



    <script>
        const title = document.getElementById("title-screen");
const company = document.getElementById("company-screen");
const skip = document.getElementById("skip-screen");

const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("start-btn");

const nameScreen = document.getElementById("name-panel");
const nameOk = document.getElementById("name-ok-btn");
const playerName = document.getElementById("player-name");
const maleBox = document.getElementById("male-box");
const femaleBox = document.getElementById("female-box");

const maleArrow = document.getElementById("male-arrow");
const femaleArrow = document.getElementById("female-arrow");

const genderOkBtn = document.getElementById("gender-ok-btn");

let selectedGender = "";

// =========================
// タイトル画面
// =========================

// 0.3秒後 タイトル表示
setTimeout(() => {

    title.classList.add("show");

}, 300);

// 2秒後 タイトルを消す
setTimeout(() => {

    title.classList.remove("show");
    title.classList.add("hide");

}, 2000);

// =========================
// 会社名画面
// =========================

// 2.8秒後 会社名表示
setTimeout(() => {

    company.classList.add("show");

}, 2800);

// 4.8秒後 会社名を消す
setTimeout(() => {

    company.classList.remove("show");
    company.classList.add("hide");

}, 4800);

// =========================
// OP省略
// =========================

// 5.6秒後 OP省略表示
setTimeout(() => {

    skip.classList.add("show");

}, 5600);

// 7.0秒後 OP省略を消す
setTimeout(() => {

    skip.classList.remove("show");
    skip.classList.add("hide");

}, 7000);

// =========================
// START画面
// =========================

// 7.8秒後 START表示
setTimeout(() => {

    startScreen.classList.add("show");

}, 7800);

// STARTボタン
startBtn.addEventListener("click", () => {

    startScreen.style.display = "none";

    nameScreen.classList.add("show");

});

// =========================
// 名前決定
// =========================

nameOk.addEventListener("click", () => {

    const name = playerName.value.trim();

    if(name === ""){
        alert("君の名前がわからないぞ！");
        return;
    }

// 名前を保存
localStorage.setItem("playerName", name);

// 名前パネルを閉じる
nameScreen.classList.remove("show");

// 性別パネルを開く
document.getElementById("gender-panel").classList.add("show");

});

const savedName = localStorage.getItem("playerName");

if(savedName){
    playerName.value = savedName;
}
// =========================
// 性別選択
// =========================

maleBox.addEventListener("click", () => {

    selectedGender = "男";

    maleArrow.textContent = "↑";
    femaleArrow.textContent = "";

});

femaleBox.addEventListener("click", () => {

    selectedGender = "女";

    femaleArrow.textContent = "↑";
    maleArrow.textContent = "";

});

genderOkBtn.addEventListener("click", () => {

    if(selectedGender === ""){

        alert("性別を選んでくれ！");
        return;

    }

    localStorage.setItem("gender", selectedGender);

    // 性別パネルを閉じる
    document.getElementById("gender-panel").classList.remove("show");

    // プレイヤー生成画面を表示
    document.getElementById("create-screen").classList.add("show");

    // 男なら水色
    if(selectedGender === "男"){

        document.getElementById("player-ball").style.background = "#4fc3ff";

    }

    // 女ならピンク
    if(selectedGender === "女"){

        document.getElementById("player-ball").style.background = "#ff6bb5";

    }

});

</script>

</body>
</html>
