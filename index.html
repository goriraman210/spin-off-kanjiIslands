<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>spin-off（スピンオフ）漢字 Typing</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Hachi+Maru+Pop&family=Reggae+One&family=Shippori+Mincho&family=Yomogi&family=Yuji+Syuku&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:#000;
            overflow:hidden;
        }

        /* タイトル画面 */
        #title-screen{
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#000;
            color:#fff;
            text-align:center;

            font-family: "Yomogi", cursive;
            font-weight:400;
            font-style:normal;
        }

        #title-screen h1{
            font-size:64px;
            margin:0;
            line-height:1.3;
        }

        /* 起動画面 */
        #boot-screen{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100vh;
            background:#000;
            z-index:9999;

            opacity:1;
            transition:opacity 0.6s ease;
        }

        /* フェードアウト */
        #boot-screen.fade-out{
            opacity:0;
            pointer-events:none;
        }
    </style>
</head>
<body>

    <!-- タイトル画面 -->
    <div id="title-screen">
        <h1>漢字 Typing<br>spin-off スピンオフ</h1>
    </div>

    <!-- 黒画面 -->
    <div id="boot-screen"></div>

    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("boot-screen").classList.add("fade-out");
            }, 2000);
        });
    </script>

</body>
</html>
