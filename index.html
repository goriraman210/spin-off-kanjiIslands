
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spin-off（スピンオフ）漢字 Typing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#000;
    overflow:hidden;
}


/* タイトル画面 */

#title-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:#000;
    color:#fff;

    font-family:"Yomogi", cursive;

    opacity:0;
    transition:opacity 0.8s ease;

}


#title-screen.show{
    opacity:1;
}


#title-screen.hide{
    opacity:0;
}



#title-screen h1{

    margin:0;

    font-size:64px;

    line-height:1.3;

}



.gradient-text{

    background:linear-gradient(to bottom,#FFD700,#00C853);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    background-clip:text;

    color:transparent;

    font-size:52px;

}



/* 会社名画面 */

#company-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:#000;

    font-family:"Yomogi", cursive;

    opacity:0;

    transition:opacity .8s ease;

}



#company-screen.show{

    opacity:1;

}



#company-screen.hide{

    opacity:0;

}



.company{

    color:#fff;

    font-size:56px;

    margin-bottom:50px;

}



.member-grid{

    display:grid;

    grid-template-columns:auto auto;

    gap:20px 120px;

    justify-content:center;

}



.member{

    font-size:40px;


    background:linear-gradient(to bottom,#ffffff,#66ccff);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    background-clip:text;

    color:transparent;

}
/* OP省略 */

#skip-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;
    color:#fff;

    font-family:"Yomogi", cursive;

    opacity:0;
    transition:opacity .8s ease;

}

#skip-screen.show{
    opacity:1;
}

#skip-screen.hide{
    opacity:0;
}

#skip-screen h1{
    font-size:60px;
}
/* スタート画面 */

#start-screen{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#000;

    opacity:0;

    transition:opacity .8s ease;

}

#start-screen.show{

    opacity:1;

}

#start-btn{

    width:320px;
    height:90px;

    border:none;
    border-radius:18px;

    background:#666;

    color:#fff;

    font-size:40px;

    font-family:"Yomogi", cursive;

    cursor:pointer;

    transition:all .25s ease;

}

#start-btn:hover{

    background:#888;

    transform:scale(1.05);

}

</style>

</head>


<body>


<!-- タイトル -->

<div id="title-screen">

    <h1>
        漢字 Typing<br>
        <span class="gradient-text">
            spin-off スピンオフ
        </span>
    </h1>

</div>



<!-- 会社名 -->

<div id="company-screen">

    <div>

        <div class="company">
            会社:(秘密厳守のため名前は出しません)
        </div>


        <div class="member-grid">

            <div class="member">©月満社</div>
            <div class="member">Sさん</div>


            <div class="member">©The Original 0</div>
            <div class="member">Goriraさん</div>


            <div class="member">©The Originar 0</div>
            <div class="member">Dさん</div>


        </div>


    </div>

</div>
<!-- 一旦OP省略 -->
 <div id="skip-screen">
    <h1>OPムービー省略</h1>
 </div>

 <!-- スタート画面 -->
<div id="start-screen">
    <button id="start-btn">スタート(START)</button>
</div>

<script>

const title = document.getElementById("title-screen");
const company = document.getElementById("company-screen");
const skip = document.getElementById("skip-screen");
const startScreen = document.getElementById("start-screen");

// 0.3秒後 ロゴ表示

setTimeout(()=>{

    title.classList.add("show");

},300);



// 2秒後 ロゴ消える

setTimeout(()=>{

    title.classList.remove("show");

    title.classList.add("hide");

},2000);



// 2.8秒後 会社名表示

setTimeout(()=>{

    company.classList.add("show");

},2800);



// 4.8秒後 会社名消える

setTimeout(()=>{

    company.classList.remove("show");

    company.classList.add("hide");

},4800);

// 5.6秒後 OP省略表示
setTimeout(()=>{

    skip.classList.add("show");

},5600);


// 7.0秒後 OP省略を消す
setTimeout(()=>{

    skip.classList.remove("show");
    skip.classList.add("hide");

},7000);
// 7.8秒後　スタート画面表示
setTimeout(()=>{

    startScreen.classList.add("show");

},7800);

</script>


</body>
</html>
